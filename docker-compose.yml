version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dicelog-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-boardgame_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Exposed locally for direct database management
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-boardgame_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dicelog-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dicelog-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@db:5432/${POSTGRES_DB:-boardgame_tracker}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost", "http://localhost:80"]}
    ports:
      - "127.0.0.1:8000:8000" # Optional: exposed for debug, proxy is the primary gateway
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/openapi.json')"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dicelog-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dicelog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dicelog-network

volumes:
  postgres_data:

networks:
  dicelog-network:
    driver: bridge
